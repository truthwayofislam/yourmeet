{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-8">
  <div class="w-full max-w-sm">

    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full gradient-btn mb-4">
        <i class="fas fa-heart text-white text-2xl"></i>
      </div>
      <h1 class="text-3xl font-bold gradient-text">YourMeet</h1>
      <p class="text-gray-400 text-sm mt-1">Start your journey today</p>
    </div>

    {% if error %}
    <div class="bg-red-500/20 border border-red-500/50 text-red-300 px-4 py-3 rounded-xl mb-4 text-sm">
      <i class="fas fa-exclamation-circle mr-2"></i>{{ error }}
    </div>
    {% endif %}

    <div class="bg-card rounded-2xl p-6 card-glow border border-white/5">
      <form method="POST" action="/register" enctype="multipart/form-data" class="space-y-4">

        <div class="grid grid-cols-2 gap-3">
          <div class="col-span-2">
            <label class="text-gray-400 text-xs font-medium uppercase tracking-wider">Full Name</label>
            <div class="relative mt-1">
              <i class="fas fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
              <input type="text" name="name" required placeholder="Your name" id="name-field"
                class="w-full bg-surface border border-white/10 rounded-xl pl-10 pr-4 py-3 text-white text-sm focus:outline-none focus:border-primary transition"/>
            </div>
          </div>

          <div>
            <label class="text-gray-400 text-xs font-medium uppercase tracking-wider">Age</label>
            <input type="number" name="age" required min="18" max="60" placeholder="18+"
              class="w-full bg-surface border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-primary transition mt-1"/>
          </div>

          <div>
            <label class="text-gray-400 text-xs font-medium uppercase tracking-wider">Gender</label>
            <select name="gender" required
              class="w-full bg-surface border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-primary transition mt-1">
              <option value="">Select</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
            </select>
          </div>
        </div>

        <div>
          <label class="text-gray-400 text-xs font-medium uppercase tracking-wider">Email</label>
          <div class="relative mt-1">
            <i class="fas fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
            <input type="email" name="email" required placeholder="your@email.com"
              class="w-full bg-surface border border-white/10 rounded-xl pl-10 pr-4 py-3 text-white text-sm focus:outline-none focus:border-primary transition"/>
          </div>
        </div>

        <div>
          <label class="text-gray-400 text-xs font-medium uppercase tracking-wider">Phone <span class="text-red-400">*</span></label>
          <div class="relative mt-1">
            <i class="fas fa-phone absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
            <input type="tel" name="phone" required placeholder="+34612345678 or +919876543210"
              class="w-full bg-surface border border-white/10 rounded-xl pl-10 pr-4 py-3 text-white text-sm focus:outline-none focus:border-primary transition"/>
          </div>
        </div>

        <div>
          <label class="text-gray-400 text-xs font-medium uppercase tracking-wider">City <span class="text-gray-500 text-xs">(optional)</span></label>
          <div class="relative mt-1">
            <i class="fas fa-map-marker-alt absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
            <input type="text" name="city" placeholder="Madrid, Mumbai, London..."
              class="w-full bg-surface border border-white/10 rounded-xl pl-10 pr-4 py-3 text-white text-sm focus:outline-none focus:border-primary transition"/>
          </div>
        </div>

        <div>
          <label class="text-gray-400 text-xs font-medium uppercase tracking-wider">Password</label>
          <div class="relative mt-1">
            <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
            <input type="password" name="password" required placeholder="••••••••"
              class="w-full bg-surface border border-white/10 rounded-xl pl-10 pr-4 py-3 text-white text-sm focus:outline-none focus:border-primary transition"/>
          </div>
        </div>

        <div>
          <label class="text-gray-400 text-xs font-medium uppercase tracking-wider">Bio <span class="text-red-400">*</span></label>
          <textarea name="bio" rows="2" required placeholder="Tell something about yourself (min 10 chars)..."
            class="w-full bg-surface border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-primary transition mt-1 resize-none"></textarea>
        </div>

        <div>
          <label class="text-gray-400 text-xs font-medium uppercase tracking-wider">Instagram / Telegram <span class="text-red-400">*</span></label>
          <div class="relative mt-1">
            <i class="fas fa-at absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
            <input type="text" name="social_handle" required placeholder="@your_username"
              class="w-full bg-surface border border-white/10 rounded-xl pl-10 pr-4 py-3 text-white text-sm focus:outline-none focus:border-primary transition"/>
          </div>
          <p class="text-gray-500 text-xs mt-1">Your matches will use this to contact you</p>
        </div>

        <div>
          <label class="text-gray-400 text-xs font-medium uppercase tracking-wider">Profile Photo <span class="text-red-400">*</span></label>
          <label class="flex items-center gap-3 bg-surface border border-dashed border-white/20 rounded-xl px-4 py-3 mt-1 cursor-pointer hover:border-primary transition" id="photo-label-wrap">
            <i class="fas fa-camera text-primary"></i>
            <span class="text-gray-400 text-sm" id="photo-label">Upload your photo (required)</span>
            <input type="file" name="photo" accept="image/*" id="photo-input" class="hidden"
              onchange="document.getElementById('photo-label').textContent = this.files[0]?.name || 'Upload your photo (required)'"/>
          </label>
        </div>

        <input type="hidden" name="telegram_id" id="tg-id-field"/>
        <button type="submit" class="w-full gradient-btn text-white font-semibold py-3 rounded-xl transition text-sm">
          Create Account <i class="fas fa-heart ml-2"></i>
        </button>
      </form>
    </div>

    <p class="text-center text-gray-400 text-sm mt-6">
      Already have account? <a href="/login" class="text-primary font-semibold hover:underline">Sign In</a>
    </p>
  </div>
</div>
<script>
  const _qp = new URLSearchParams(window.location.search);
  const _nameField = document.getElementById('name-field');
  const _tgField = document.getElementById('tg-id-field');
  if (_qp.get('name') && _nameField) _nameField.value = _qp.get('name');

  function _fillTgId() {
    if (_tgField && _tgField.value) return; // already filled
    const id = _qp.get('tg_id')
      || window.Telegram?.WebApp?.initDataUnsafe?.user?.id
      || null;
    if (id) _tgField.value = id;
  }

  // Try immediately
  _fillTgId();

  // Try after WebApp ready
  if (window.Telegram?.WebApp) {
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
    _fillTgId();
    // Try again after short delay (WebApp sometimes loads data late)
    setTimeout(_fillTgId, 300);
    setTimeout(_fillTgId, 800);
  }

  // Final check on submit
  document.querySelector('form').addEventListener('submit', function(e) {
    _fillTgId(); // last chance to fill telegram_id before submit
    const name = document.getElementById('name-field').value.trim();
    const email = document.querySelector('[name=email]').value.trim();
    const phone = document.querySelector('[name=phone]').value.trim();
    const city = document.querySelector('[name=city]').value.trim();
    const bio = document.querySelector('[name=bio]').value.trim();
    const photo = document.getElementById('photo-input').files[0];
    const errors = [];

    if (name.length < 2) errors.push('Name must be at least 2 characters');
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) errors.push('Enter a valid email address');
    const digits = phone.replace(/\D/g, '');
    if (digits.length < 7) errors.push('Enter a valid phone number with country code');
    if (bio.length < 10) errors.push('Bio must be at least 10 characters');
    if (!photo) errors.push('Profile photo is required');

    if (errors.length > 0) {
      e.preventDefault();
      let box = document.getElementById('client-error');
      if (!box) {
        box = document.createElement('div');
        box.id = 'client-error';
        box.className = 'bg-red-500/20 border border-red-500/50 text-red-300 px-4 py-3 rounded-xl mb-4 text-sm';
        document.querySelector('form').prepend(box);
      }
      box.innerHTML = '<i class="fas fa-exclamation-circle mr-2"></i>' + errors[0];
      box.scrollIntoView({behavior: 'smooth', block: 'center'});
    }
  });
</script>
{% endblock %}
