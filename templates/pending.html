<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Under Review — YourMeet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #222);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
        }
        .card {
            text-align: center;
            max-width: 360px;
            width: 100%;
        }
        .icon { font-size: 64px; margin-bottom: 16px; }
        h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
        p { font-size: 15px; color: #666; line-height: 1.6; margin-bottom: 8px; }
        .steps {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 16px;
            margin: 20px 0;
            text-align: left;
        }
        .steps p { color: #444; margin-bottom: 6px; font-size: 14px; }
        .steps p:last-child { margin-bottom: 0; }
        .badge {
            display: inline-block;
            background: #fff3cd;
            color: #856404;
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">⏳</div>
        <h1>Profile Under Review</h1>
        <div class="badge">⏳ Pending Approval</div>
        <p>Hey <strong>{{ user.name }}</strong>! Your profile has been submitted successfully.</p>
        <div class="steps">
            <p>✅ Profile submitted</p>
            <p>🔍 Admin is reviewing your profile</p>
            <p>📩 You'll get a Telegram message once approved</p>
            <p>💕 Then you can start swiping!</p>
        </div>
        <p>This usually takes <strong>less than 24 hours</strong>.</p>
    </div>
    <script>
        if (window.Telegram && window.Telegram.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
        }
    </script>
</body>
</html>
