{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">

    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full gradient-btn mb-4">
        <i class="fas fa-heart text-white text-2xl"></i>
      </div>
      <h1 class="text-3xl font-bold gradient-text">YourMeet</h1>
      <p class="text-gray-400 text-sm mt-1">Find your perfect match</p>
    </div>

    {% if error %}
    <div class="bg-red-500/20 border border-red-500/50 text-red-300 px-4 py-3 rounded-xl mb-4 text-sm">
      <i class="fas fa-exclamation-circle mr-2"></i>{{ error }}
    </div>
    {% endif %}

    <div class="bg-card rounded-2xl p-6 card-glow border border-white/5">
      <form method="POST" action="/login" class="space-y-4">
        <div>
          <label class="text-gray-400 text-xs font-medium uppercase tracking-wider">Email</label>
          <div class="relative mt-1">
            <i class="fas fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
            <input type="email" name="email" required placeholder="your@email.com"
              class="w-full bg-surface border border-white/10 rounded-xl pl-10 pr-4 py-3 text-white text-sm focus:outline-none focus:border-primary transition"/>
          </div>
        </div>
        <div>
          <label class="text-gray-400 text-xs font-medium uppercase tracking-wider">Password</label>
          <div class="relative mt-1">
            <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
            <input type="password" name="password" required placeholder="••••••••"
              class="w-full bg-surface border border-white/10 rounded-xl pl-10 pr-4 py-3 text-white text-sm focus:outline-none focus:border-primary transition"/>
          </div>
        </div>
        <button type="submit" class="w-full gradient-btn text-white font-semibold py-3 rounded-xl transition text-sm mt-2">
          Sign In <i class="fas fa-arrow-right ml-2"></i>
        </button>
      </form>
    </div>

    <p class="text-center text-gray-400 text-sm mt-6">
      New here? <a href="/register" class="text-primary font-semibold hover:underline">Create Account</a>
    </p>
  </div>
</div>
{% endblock %}
