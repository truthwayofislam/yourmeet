<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Telegram — YourMeet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #222);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
        }
        .card { text-align: center; max-width: 360px; width: 100%; }
        .icon { font-size: 64px; margin-bottom: 16px; }
        h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
        p { font-size: 15px; color: #666; line-height: 1.6; margin-bottom: 16px; }
        .btn {
            display: block; width: 100%; padding: 14px;
            border-radius: 12px; border: none; font-size: 16px;
            font-weight: 600; cursor: pointer; margin-bottom: 12px;
            text-decoration: none; text-align: center;
        }
        .btn-primary { background: #2AABEE; color: #fff; }
        .btn-skip { background: #f0f0f0; color: #666; font-size: 14px; padding: 10px; }
        .benefit { background: #f0f8ff; border-radius: 12px; padding: 14px; margin-bottom: 20px; text-align: left; }
        .benefit p { color: #333; margin-bottom: 6px; font-size: 14px; }
        .benefit p:last-child { margin-bottom: 0; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📱</div>
        <h1>Connect Telegram</h1>
        <p>Hey <strong>{{ user.name }}</strong>! Connect your Telegram to get the best experience.</p>
        <div class="benefit">
            <p>✅ Get notified when you match</p>
            <p>✅ Receive broadcast messages</p>
            <p>✅ Get approval notification</p>
            <p>✅ Use bot commands anytime</p>
        </div>
        <a href="https://t.me/{{ bot_username }}?start=link" class="btn btn-primary" id="connect-btn">
            📱 Connect via Telegram Bot
        </a>
        <button class="btn btn-skip" onclick="skipConnect()">Skip for now →</button>
    </div>
    <script>
        // If opened inside Telegram WebApp, auto-connect
        if (window.Telegram?.WebApp?.initDataUnsafe?.user?.id) {
            const tgId = window.Telegram.WebApp.initDataUnsafe.user.id;
            fetch('/connect-telegram', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id: tgId})
            }).then(() => { window.location.href = '/'; });
        }

        function skipConnect() {
            window.location.href = '/';
        }
    </script>
</body>
</html>
