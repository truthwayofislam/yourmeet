<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>YourMeet - {% block title %}Find Your Match{% endblock %}</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#b76e79',
            secondary: '#8b5cf6',
            dark: '#0f0f1a',
            card: '#1a1a2e',
            surface: '#16213e',
          },
          fontFamily: { poppins: ['Poppins', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { font-family: 'Poppins', sans-serif; background: #0f0f1a; overflow-x: hidden; max-width: 100vw; }
    .gradient-text { background: linear-gradient(135deg, #b76e79, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .gradient-btn { background: linear-gradient(135deg, #b76e79, #8b5cf6); }
    .gradient-btn:hover { background: linear-gradient(135deg, #a05c67, #7c3aed); }
    .card-glow { box-shadow: 0 0 30px rgba(183,110,121,0.15); }
    .nav-active { background: linear-gradient(135deg, rgba(183,110,121,0.2), rgba(139,92,246,0.2)); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #1a1a2e; }
    ::-webkit-scrollbar-thumb { background: #b76e79; border-radius: 2px; }
    .tg-safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }
    img { max-width: 100%; }
  </style>
</head>
<body class="min-h-screen text-white">

<script>
  // Telegram Mini App init
  if (window.Telegram && window.Telegram.WebApp) {
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.setHeaderColor('#0f0f1a');
    tg.setBackgroundColor('#0f0f1a');

    const user = tg.initDataUnsafe?.user;
    if (user && user.id) {
      const hasCookie = document.cookie.includes('token=');
      if (!hasCookie) {
        // Block page render until auth done
        document.body.style.display = 'none';
        fetch('/auth/telegram', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(user)
        }).then(r => r.json()).then(data => {
          if (data.token) {
            document.cookie = `token=${data.token};path=/;max-age=2592000`;
            if (data.new_user) {
              const params = new URLSearchParams({name: user.first_name || '', tg_id: user.id});
              window.location.replace('/register?' + params.toString());
            } else {
              // Let server decide — if profile incomplete it will redirect to /register
              window.location.replace('/');
            }
          } else {
            document.body.style.display = '';
          }
        }).catch(() => { document.body.style.display = ''; });
      }
    }
  }
</script>

{% if user is defined and user %}
<nav class="fixed bottom-0 left-0 right-0 z-50 bg-card border-t border-white/10 px-6 py-3 tg-safe-bottom">
  <div class="flex justify-around items-center max-w-md mx-auto">
    <a href="/" class="flex flex-col items-center gap-1 text-xs {% if active == 'home' %}text-primary{% else %}text-gray-400{% endif %}">
      <i class="fas fa-fire text-xl"></i><span>Discover</span>
    </a>
    <a href="/matches" class="flex flex-col items-center gap-1 text-xs {% if active == 'matches' %}text-primary{% else %}text-gray-400{% endif %}">
      <i class="fas fa-heart text-xl"></i><span>Matches</span>
    </a>
    {% if user.is_premium %}
    <a href="/liked-me" class="flex flex-col items-center gap-1 text-xs {% if active == 'liked' %}text-primary{% else %}text-gray-400{% endif %}">
      <i class="fas fa-star text-xl"></i><span>Liked You</span>
    </a>
    {% else %}
    <a href="/premium" class="flex flex-col items-center gap-1 text-xs text-gray-400">
      <i class="fas fa-star text-xl"></i><span>Liked You</span>
    </a>
    {% endif %}
    <a href="/premium" class="flex flex-col items-center gap-1 text-xs {% if active == 'premium' %}text-yellow-400{% else %}text-gray-400{% endif %}">
      <i class="fas fa-crown text-xl"></i><span>Premium</span>
    </a>
    <a href="/profile" class="flex flex-col items-center gap-1 text-xs {% if active == 'profile' %}text-primary{% else %}text-gray-400{% endif %}">
      <i class="fas fa-user text-xl"></i><span>Profile</span>
    </a>
  </div>
</nav>
{% endif %}

<main class="{% if user is defined and user %}pb-24{% endif %}">
  {% block content %}{% endblock %}
</main>

<script>
  // Telegram BackButton — show on non-home pages
  if (window.Telegram && window.Telegram.WebApp) {
    const tg = window.Telegram.WebApp;
    const path = window.location.pathname;
    if (path !== '/' && path !== '/login' && path !== '/register') {
      tg.BackButton.show();
      tg.BackButton.onClick(() => window.history.back());
    } else {
      tg.BackButton.hide();
    }
  }
</script>

</body>
</html>
