<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>YourMeet</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --primary: #E91E8C;
      --secondary: #9C27B0;
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --surface: #16213e;
      --text: #ffffff;
      --text-muted: #8892a4;
      --border: rgba(255,255,255,0.08);
      --gradient: linear-gradient(135deg, #E91E8C, #9C27B0);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow-x: hidden; }
    body { padding-bottom: 70px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 2px; }

    /* Glass card */
    .glass {
      background: rgba(26,26,46,0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 14px 24px; border-radius: 12px; border: none;
      font-size: 15px; font-weight: 600; cursor: pointer;
      min-height: 48px; transition: opacity 0.2s, transform 0.1s;
      width: 100%;
    }
    .btn:active { transform: scale(0.97); opacity: 0.85; }
    .btn-primary { background: var(--gradient); color: #fff; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: rgba(244,67,54,0.15); color: #f44336; border: 1px solid rgba(244,67,54,0.3); }
    .btn-sm { padding: 10px 18px; font-size: 13px; min-height: 40px; }
    .btn:disabled { opacity: 0.4; pointer-events: none; }

    /* Bottom nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; height: 64px;
      background: rgba(22,33,62,0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-around;
      z-index: 100; padding: 0 8px;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 8px 12px; border-radius: 10px; text-decoration: none;
      color: var(--text-muted); font-size: 11px; font-weight: 500;
      transition: color 0.2s; min-width: 56px;
    }
    .nav-item svg { width: 22px; height: 22px; }
    .nav-item.active { color: var(--primary); }
    .nav-item.active svg { filter: drop-shadow(0 0 6px var(--primary)); }

    /* Page header */
    .page-header {
      padding: 16px 20px 8px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .page-title { font-size: 22px; font-weight: 700; }

    /* Badge */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
    }
    .badge-premium { background: rgba(233,30,140,0.15); color: var(--primary); border: 1px solid rgba(233,30,140,0.3); }
    .badge-verified { background: rgba(156,39,176,0.15); color: #ce93d8; border: 1px solid rgba(156,39,176,0.3); }
    .badge-approved { background: rgba(76,175,80,0.15); color: #81c784; border: 1px solid rgba(76,175,80,0.3); }

    /* Toast */
    #toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); padding: 12px 20px; border-radius: 12px;
      font-size: 14px; font-weight: 500; z-index: 999;
      opacity: 0; transition: opacity 0.3s, transform 0.3s;
      white-space: nowrap; max-width: 90vw;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--card) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* Spinner */
    .spinner {
      width: 36px; height: 36px; border: 3px solid var(--border);
      border-top-color: var(--primary); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Interest tags */
    .tag {
      display: inline-flex; align-items: center; padding: 6px 12px;
      background: rgba(233,30,140,0.1); border: 1px solid rgba(233,30,140,0.25);
      border-radius: 20px; font-size: 13px; color: var(--primary);
    }

    /* Avatar */
    .avatar {
      width: 56px; height: 56px; border-radius: 50%; object-fit: cover;
      border: 2px solid var(--border);
    }

    /* RTL support for Arabic */
    [dir="rtl"] { text-align: right; }
  </style>
</head>
<body>

{% block content %}{% endblock %}

<!-- Bottom Nav -->
{% if active is defined %}
<nav class="bottom-nav">
  <a href="/" class="nav-item {% if active == 'home' %}active{% endif %}">
    <svg viewBox="0 0 24 24" fill="{% if active == 'home' %}currentColor{% else %}none{% endif %}" stroke="currentColor" stroke-width="2">
      <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    <span data-i18n="nav_home">Home</span>
  </a>
  <a href="/map" class="nav-item {% if active == 'map' %}active{% endif %}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/>
    </svg>
    <span data-i18n="nav_map">Map</span>
  </a>
  <a href="/matches" class="nav-item {% if active == 'matches' %}active{% endif %}">
    <svg viewBox="0 0 24 24" fill="{% if active == 'matches' %}currentColor{% else %}none{% endif %}" stroke="currentColor" stroke-width="2">
      <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
    </svg>
    <span data-i18n="nav_matches">Matches</span>
  </a>
  <a href="/profile" class="nav-item {% if active == 'profile' %}active{% endif %}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
    </svg>
    <span data-i18n="nav_profile">Profile</span>
  </a>
  <a href="/premium" class="nav-item {% if active == 'premium' %}active{% endif %}">
    <svg viewBox="0 0 24 24" fill="{% if active == 'premium' %}currentColor{% else %}none{% endif %}" stroke="currentColor" stroke-width="2">
      <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
    </svg>
    <span data-i18n="nav_premium">Premium</span>
  </a>
</nav>
{% endif %}

<div id="toast"></div>

<script type="module">
  import { initI18n, applyStrings } from '/static/js/i18n.js';

  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
    if (document.documentElement.getAttribute('dir') !== 'rtl') {
      const lang = tg.initDataUnsafe?.user?.language_code?.slice(0,2);
      if (lang === 'ar') document.documentElement.setAttribute('dir', 'rtl');
    }
  }

  // Auth on every page load
  (async () => {
    const token = document.cookie.match(/token=([^;]+)/)?.[1];
    if (!token && tg?.initDataUnsafe?.user) {
      const u = tg.initDataUnsafe.user;
      const res = await fetch('/auth/telegram', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: u.id, first_name: u.first_name, language_code: u.language_code }),
      });
      if (res.ok) {
        const data = await res.json();
        if (data.token) {
          document.cookie = `token=${data.token};path=/;max-age=2592000`;
          if (data.new_user) window.location.href = '/setup';
        }
      }
    }
    await initI18n();
    applyStrings();
  })();

  window.showToast = (msg, duration = 2500) => {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  };
</script>

{% block scripts %}{% endblock %}
</body>
</html>
